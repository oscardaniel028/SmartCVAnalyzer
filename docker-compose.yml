services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: smartcv-sqlserver
    environment:
      SA_PASSWORD: "${DB_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost",
             "-U", "sa",
             "-P", "${DB_PASSWORD}",
             "-Q", "SELECT 1",
             "-No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartcv-api
    ports:
      - "8080:8080"
    environment:
      - "ConnectionStrings__DefaultConnection=Server=sqlserver;Database=SmartCVAnalyzer;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;"
      - "Jwt__SecretKey=${JWT_SECRET_KEY}"
      - "Jwt__Issuer=SmartCVAnalyzer"
      - "Jwt__Audience=SmartCVAnalyzerUsers"
      - "Jwt__ExpirationHours=24"
      - "OpenAI__ApiKey=${OPENAI_API_KEY}"
      - "OpenAI__Model=gpt-4o"
      - "OpenAI__MaxTokens=2000"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

volumes:
  sqlserver_data: